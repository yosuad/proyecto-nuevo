<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard-styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
  </head>
  <body>
    <div class="sidebar">
      <ul>
        <li>
          <a href="crm.html"><i class="fas fa-user"></i> Perfil</a>
        </li>
        <li>
          <a href="crm.html"><i class="fas fa-home"></i> Inicio</a>
        </li>
        <li>
          <a href="crm.html"><i class="fas fa-user-plus"></i> Crear Técnico</a>
        </li>
        <li>
          <a href="crm.html"><i class="fas fa-users"></i> Ver Técnicos</a>
        </li>
        <li>
          <a href="crm.html"><i class="fas fa-plus"></i> Crear Servicio</a>
        </li>
        <li>
          <a href="crm.html"><i class="fas fa-eye"></i> Ver Servicios</a>
        </li>
        <li>
          <a href="crm.html"
            ><i class="fas fa-tasks"></i> Servicios Asignados</a
          >
        </li>
        <li>
          <a href="crm.html"
            ><i class="fas fa-spinner"></i> Servicios en Proceso</a
          >
        </li>
        <li>
          <a href="crm.html"><i class="fas fa-filter"></i> Filtrar</a>
        </li>
        <li>
          <a href="crm.html"><i class="fas fa-sign-out-alt"></i> Salir</a>
        </li>
      </ul>
    </div>
    <div class="dashboard-container">
      <h1>Dashboard</h1>
      <div class="stats-container">
        <div class="stat-card">
          <i class="fas fa-users"></i>
          <div class="stat-info">
            <h2>Técnicos</h2>
            <p>20</p>
          </div>
        </div>
        <div class="stat-card">
          <i class="fas fa-tasks"></i>
          <div class="stat-info">
            <h2>Servicios Pendientes</h2>
            <p>15</p>
          </div>
        </div>
        <div class="stat-card">
          <i class="fas fa-spinner"></i>
          <div class="stat-info">
            <h2>Servicios en Proceso</h2>
            <p>10</p>
          </div>
        </div>
        <div class="stat-card">
          <i class="fas fa-check"></i>
          <div class="stat-info">
            <h2>Servicios Completados</h2>
            <p>30</p>
          </div>
        </div>
        <div class="stat-card">
          <i class="fas fa-times"></i>
          <div class="stat-info">
            <h2>Servicios Cancelados</h2>
            <p>5</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
